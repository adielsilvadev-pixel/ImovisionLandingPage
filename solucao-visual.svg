<svg viewBox="0 0 580 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2F2F2"/>
      <stop offset="100%" stop-color="#e8f0fb"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#06111f"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0369BF"/>
      <stop offset="100%" stop-color="#0a85ff"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8ff"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0369BF" flood-opacity="0.25"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="165" y="40" width="250" height="440" rx="28"/>
    </clipPath>
    <style>
      @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes slidein { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      .dot-anim { animation: pulse 2s ease-in-out infinite; }
      .card-float { animation: float 4s ease-in-out infinite; }
      .card-float2 { animation: float 4.5s ease-in-out infinite 0.5s; }
      .card-float3 { animation: float 3.8s ease-in-out infinite 1s; }
    </style>
  </defs>

  <!-- Background glow -->
  <ellipse cx="290" cy="260" rx="240" ry="210" fill="#0369BF" opacity="0.06"/>

  <!-- ===================== PHONE FRAME ===================== -->
  <rect x="165" y="40" width="250" height="440" rx="28" fill="#0d1b2e" filter="url(#shadow)"/>
  <!-- Screen area -->
  <rect x="170" y="45" width="240" height="430" rx="24" fill="url(#phoneGrad)" clip-path="url(#phoneClip)"/>

  <!-- Status bar -->
  <rect x="170" y="45" width="240" height="22" rx="0" fill="#06111f" opacity="0.8"/>
  <circle cx="295" cy="57" r="6" fill="#1a2b3c"/>
  <!-- notch detail -->
  <rect x="265" y="51" width="60" height="12" rx="6" fill="#06111f"/>

  <!-- App Header -->
  <rect x="170" y="67" width="240" height="48" fill="#0f1f33"/>
  <!-- Logo text -->
  <text x="200" y="88" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0369BF" letter-spacing="0.5">IMOVISION</text>
  <text x="200" y="103" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">DIGITAL · IA</text>
  <!-- Avatar -->
  <circle cx="386" cy="91" r="16" fill="#0369BF" opacity="0.3"/>
  <circle cx="386" cy="91" r="12" fill="#0369BF"/>
  <text x="386" y="96" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">AI</text>

  <!-- ---- Stats row ---- -->
  <rect x="170" y="115" width="240" height="56" fill="#111e30"/>
  <!-- Stat 1 -->
  <text x="200" y="133" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.45)">LEADS HOJE</text>
  <text x="200" y="152" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#D9D906">47</text>
  <!-- Divider -->
  <line x1="265" y1="120" x2="265" y2="165" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Stat 2 -->
  <text x="278" y="133" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.45)">CONVERSÃO</text>
  <text x="278" y="152" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#10b981">23%</text>
  <!-- Divider -->
  <line x1="340" y1="120" x2="340" y2="165" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Stat 3 -->
  <text x="350" y="133" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.45)">VISITAS</text>
  <text x="350" y="152" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">12</text>

  <!-- ---- Mini bar chart ---- -->
  <rect x="170" y="171" width="240" height="58" fill="#0d1827"/>
  <text x="182" y="183" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">LEADS / SEMANA</text>
  <!-- Bars -->
  <rect x="185" y="208" width="12" height="16" rx="3" fill="#0369BF" opacity="0.5"/>
  <rect x="202" y="198" width="12" height="26" rx="3" fill="#0369BF" opacity="0.65"/>
  <rect x="219" y="203" width="12" height="21" rx="3" fill="#0369BF" opacity="0.65"/>
  <rect x="236" y="192" width="12" height="32" rx="3" fill="#0369BF" opacity="0.8"/>
  <rect x="253" y="186" width="12" height="38" rx="3" fill="#0369BF"/>
  <rect x="270" y="194" width="12" height="30" rx="3" fill="#0369BF" opacity="0.75"/>
  <rect x="287" y="180" width="12" height="44" rx="3" fill="#D9D906"/>
  <!-- Line chart overlay -->
  <polyline points="191,216 208,206 225,211 242,200 259,194 276,202 293,188" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,2"/>

  <!-- ---- Chat section ---- -->
  <rect x="170" y="229" width="240" height="246" fill="#0d1827"/>
  <text x="182" y="244" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">ATENDIMENTO IA · TEMPO REAL</text>

  <!-- Divider -->
  <line x1="170" y1="250" x2="410" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Lead message (incoming) -->
  <rect x="180" y="257" width="148" height="36" rx="10" rx="10" fill="#1a2b3c"/>
  <!-- Bubble tail -->
  <polygon points="180,268 170,272 180,276" fill="#1a2b3c"/>
  <text x="190" y="272" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.8)">Bom dia! Vi o T3 em Cascais,</text>
  <text x="190" y="284" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.8)">posso agendar uma visita?</text>
  <text x="315" y="295" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">14:32</text>

  <!-- IA typing indicator -->
  <rect x="240" y="301" width="160" height="26" rx="10" fill="#0369BF" opacity="0.2"/>
  <text x="252" y="318" font-family="Arial,sans-serif" font-size="8" fill="#0369BF">IA a processar</text>
  <circle cx="358" cy="314" r="2.5" fill="#0369BF" class="dot-anim"/>
  <circle cx="366" cy="314" r="2.5" fill="#0369BF" opacity="0.6" class="dot-anim" style="animation-delay:0.3s"/>
  <circle cx="374" cy="314" r="2.5" fill="#0369BF" opacity="0.3" class="dot-anim" style="animation-delay:0.6s"/>

  <!-- IA response -->
  <rect x="232" y="334" width="168" height="60" rx="10" fill="#0369BF"/>
  <polygon points="400,345 410,350 400,355" fill="#0369BF"/>
  <text x="244" y="349" font-family="Arial,sans-serif" font-size="8.5" fill="white">Olá! Claro, temos disponibili-</text>
  <text x="244" y="361" font-family="Arial,sans-serif" font-size="8.5" fill="white">dade amanhã às 10h e às 15h.</text>
  <text x="244" y="373" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.85)">Qual prefere? Confirmo já! 🏠</text>
  <text x="244" y="388" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">14:32 · Respondido em 3s ✓✓</text>

  <!-- Lead qualification badge -->
  <rect x="183" y="404" width="224" height="28" rx="8" fill="rgba(16,185,129,0.15)"/>
  <circle cx="196" cy="418" r="6" fill="#10b981"/>
  <text x="196" y="421.5" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">✓</text>
  <text x="207" y="416" font-family="Arial,sans-serif" font-size="8" font-weight="600" fill="#10b981">Lead qualificado automaticamente</text>
  <text x="207" y="427" font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.5)">Score: 92/100 · Intenção de compra: Alta</text>

  <!-- Bottom nav bar -->
  <rect x="170" y="435" width="240" height="40" rx="0" fill="#0f1f33"/>
  <!-- Nav icons (simplified) -->
  <rect x="200" y="447" width="18" height="16" rx="3" fill="#0369BF" opacity="0.6"/>
  <rect x="233" y="447" width="18" height="16" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="266" y="447" width="18" height="16" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="299" y="447" width="18" height="16" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="332" y="447" width="18" height="16" rx="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Phone frame border -->
  <rect x="165" y="40" width="250" height="440" rx="28" fill="none" stroke="#1e3a5a" stroke-width="2"/>

  <!-- Camera notch -->
  <rect x="262" y="48" width="56" height="10" rx="5" fill="#06111f"/>
  <circle cx="315" cy="53" r="3.5" fill="#1a2b3c"/>

  <!-- ==================== FLOATING CARDS ==================== -->

  <!-- Card TOP-RIGHT: Notificação de lead -->
  <g class="card-float" style="transform-origin:470px 80px">
    <rect x="410" y="55" width="158" height="72" rx="14" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
    <rect x="410" y="55" width="158" height="14" rx="14" fill="#0369BF" opacity="0"/>
    <rect x="410" y="55" width="4" height="72" rx="2" fill="#D9D906"/>
    <!-- Icon -->
    <circle cx="432" cy="91" r="14" fill="rgba(3,105,191,0.1)"/>
    <!-- House icon -->
    <polygon points="432,82 440,89 440,100 424,100 424,89" fill="none" stroke="#0369BF" stroke-width="1.5"/>
    <rect x="429" y="93" width="6" height="7" fill="#0369BF" opacity="0.3"/>
    <line x1="423" y1="89" x2="441" y2="89" stroke="#0369BF" stroke-width="1" opacity="0.5"/>
    <!-- Text -->
    <text x="452" y="78" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.5)" font-weight="600" letter-spacing="0.3">NOVO LEAD</text>
    <text x="452" y="91" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="#0d1827">João Silva</text>
    <text x="452" y="103" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.55)">T3 · Lisboa · €380k</text>
    <text x="452" y="116" font-family="Arial,sans-serif" font-size="7.5" fill="#10b981" font-weight="600">● Qualificado · agora</text>
  </g>

  <!-- Card TOP-LEFT: Automação ativa -->
  <g class="card-float2" style="transform-origin:90px 130px">
    <rect x="14" y="88" width="140" height="78" rx="14" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
    <rect x="14" y="88" width="4" height="78" rx="2" fill="#10b981"/>
    <text x="26" y="106" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.5)" font-weight="600" letter-spacing="0.3">AUTOMAÇÃO</text>
    <!-- Progress circle (simplified) -->
    <circle cx="42" cy="135" r="18" fill="none" stroke="rgba(3,105,191,0.12)" stroke-width="4"/>
    <circle cx="42" cy="135" r="18" fill="none" stroke="#0369BF" stroke-width="4" stroke-dasharray="90 113" stroke-linecap="round" transform="rotate(-90 42 135)"/>
    <text x="42" y="139" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0369BF" text-anchor="middle">80%</text>
    <text x="68" y="123" font-family="Arial,sans-serif" font-size="8.5" font-weight="600" fill="#0d1827">Tempo poupado</text>
    <text x="68" y="136" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.5)">em tarefas manuais</text>
    <text x="68" y="155" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.4)">3h/dia por consultor</text>
  </g>

  <!-- Card BOTTOM-LEFT: Funil de conversão -->
  <g class="card-float3" style="transform-origin:90px 400px">
    <rect x="10" y="340" width="148" height="110" rx="14" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
    <rect x="10" y="340" width="4" height="110" rx="2" fill="#0369BF"/>
    <text x="22" y="358" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.5)" font-weight="600" letter-spacing="0.3">FUNIL DE VENDAS</text>
    <!-- Funnel visualization -->
    <!-- Stage 1 -->
    <rect x="22" y="366" width="124" height="16" rx="4" fill="#0369BF" opacity="0.9"/>
    <text x="30" y="378" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="600">Leads Captados</text>
    <text x="130" y="378" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="700" text-anchor="end">312</text>
    <!-- Stage 2 -->
    <rect x="30" y="387" width="100" height="15" rx="4" fill="#0369BF" opacity="0.65"/>
    <text x="38" y="399" font-family="Arial,sans-serif" font-size="8" fill="white">Qualificados</text>
    <text x="122" y="399" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="700" text-anchor="end">198</text>
    <!-- Stage 3 -->
    <rect x="40" y="406" width="78" height="14" rx="4" fill="#0369BF" opacity="0.45"/>
    <text x="48" y="417" font-family="Arial,sans-serif" font-size="8" fill="white">Visitas</text>
    <text x="110" y="417" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="700" text-anchor="end">84</text>
    <!-- Stage 4 -->
    <rect x="52" y="424" width="52" height="14" rx="4" fill="#D9D906"/>
    <text x="60" y="435" font-family="Arial,sans-serif" font-size="8" fill="#0d1827" font-weight="700">Fechados</text>
    <text x="97" y="435" font-family="Arial,sans-serif" font-size="8" fill="#0d1827" font-weight="700" text-anchor="end">47</text>
  </g>

  <!-- Card BOTTOM-RIGHT: Visita agendada -->
  <g class="card-float" style="transform-origin:470px 400px;animation-delay:1.5s">
    <rect x="415" y="355" width="152" height="88" rx="14" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
    <rect x="415" y="355" width="4" height="88" rx="2" fill="#10b981"/>
    <text x="427" y="373" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.5)" font-weight="600" letter-spacing="0.3">AGENDA · IA</text>
    <!-- Calendar icon -->
    <rect x="427" y="381" width="24" height="22" rx="4" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1"/>
    <line x1="427" y1="386" x2="451" y2="386" stroke="#10b981" stroke-width="1"/>
    <text x="434" y="399" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#10b981">15</text>
    <!-- Info -->
    <text x="458" y="391" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="#0d1827">Visita Marcada</text>
    <text x="458" y="404" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.55)">Amanhã · 15:00</text>
    <text x="427" y="425" font-family="Arial,sans-serif" font-size="8" fill="rgba(0,0,0,0.4)">T3 · Cascais · Ref. #4821</text>
    <rect x="427" y="430" width="130" height="8" rx="4" fill="rgba(16,185,129,0.12)"/>
    <rect x="427" y="430" width="90" height="8" rx="4" fill="rgba(16,185,129,0.6)"/>
    <text x="560" y="437" font-family="Arial,sans-serif" font-size="7" fill="#10b981" text-anchor="end">Auto-agendado ✓</text>
  </g>

  <!-- ====== Connection lines (data flow) ====== -->
  <!-- From left card to phone -->
  <line x1="154" y1="127" x2="166" y2="160" stroke="#0369BF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="154" y1="390" x2="166" y2="340" stroke="#0369BF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <!-- From right card to phone -->
  <line x1="410" y1="90" x2="414" y2="180" stroke="#0369BF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="415" y1="390" x2="414" y2="380" stroke="#10b981" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>

  <!-- Data flow dots on left line -->
  <circle cx="158" cy="235" r="3" fill="#0369BF" opacity="0.4" class="dot-anim"/>
  <circle cx="163" cy="290" r="2" fill="#0369BF" opacity="0.25" class="dot-anim" style="animation-delay:0.4s"/>

  <!-- Data flow dots on right line -->
  <circle cx="412" cy="220" r="3" fill="#D9D906" opacity="0.5" class="dot-anim" style="animation-delay:0.8s"/>
  <circle cx="413" cy="300" r="2" fill="#0369BF" opacity="0.3" class="dot-anim" style="animation-delay:1.2s"/>

  <!-- Small floating badge: "24/7" -->
  <rect x="270" y="14" width="64" height="26" rx="13" fill="#0369BF" filter="url(#softShadow)"/>
  <text x="302" y="31" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">24/7 IA</text>

  <!-- Small floating house icons -->
  <g opacity="0.18" transform="translate(20,30)">
    <polygon points="0,-10 10,0 10,12 -10,12 -10,0" fill="#0369BF"/>
    <rect x="-3" y="5" width="6" height="7" fill="#0369BF"/>
  </g>
  <g opacity="0.15" transform="translate(530,280)">
    <polygon points="0,-8 8,0 8,10 -8,10 -8,0" fill="#0369BF"/>
    <rect x="-2.5" y="4" width="5" height="6" fill="#0369BF"/>
  </g>
  <g opacity="0.12" transform="translate(55,480)">
    <polygon points="0,-7 7,0 7,9 -7,9 -7,0" fill="#D9D906"/>
  </g>

</svg>
